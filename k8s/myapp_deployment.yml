apiVersion: apps/v1
kind: Deployment
metadata: 
  name: myapp
  labels: 
    app: myapp

spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
        - name: myappcontainer
          image: jogle1/node-todo-app:latest
          ports:
            - containerPort: 8080
          imagePullPolicy: Always 
